<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端笔记本</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --sidebar-bg: #ffffff;
            --text-color: #333;
            --border-color: #e0e0e0;
            --hover-color: #f0f0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .note-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .note-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .note-item:hover {
            background-color: var(--hover-color);
        }

        .note-item.active {
            background-color: #e3f2fd;
            border-left: 4px solid var(--primary-color);
        }

        .note-title-preview {
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-date {
            font-size: 12px;
            color: #888;
        }

        .add-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background-color: #357abd;
        }

        /* 编辑区域样式 */
        .editor {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .editor-input {
            border: none;
            outline: none;
            font-size: 18px;
            color: var(--text-color);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .editor-textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            line-height: 1.6;
            color: #555;
        }

        .status-bar {
            margin-top: 10px;
            font-size: 12px;
            color: #999;
            text-align: right;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: 30%; }
            .editor { margin: 0; border-radius: 0; height: 70%; }
        }
    </style>
</head>
<body>

    <!-- 左侧侧边栏 -->
    <div class="sidebar">
        <div class="logo">
            <span>📒</span> 简易笔记
        </div>
        <ul class="note-list" id="noteList">
            <!-- 笔记列表将通过 JS 动态生成 -->
        </ul>
        <button class="add-btn" onclick="addNewNote()">+ 新建笔记</button>
    </div>

    <!-- 右侧编辑区 -->
    <div class="editor">
        <input type="text" id="noteTitle" class="editor-input" placeholder="输入标题...">
        <textarea id="noteContent" class="editor-textarea" placeholder="在这里记录你的想法..."></textarea>
        <div class="status-bar" id="statusBar">准备就绪</div>
    </div>

    <script>
        // 获取 DOM 元素
        const noteListEl = document.getElementById('noteList');
        const titleInput = document.getElementById('noteTitle');
        const contentInput = document.getElementById('noteContent');
        const statusBar = document.getElementById('statusBar');

        // 初始化数据
        let notes = JSON.parse(localStorage.getItem('myNotes')) || [];
        let activeNoteId = null;

        // 初始化应用
        function init() {
            renderNoteList();
            if (notes.length > 0) {
                loadNote(notes[0].id);
            } else {
                addNewNote();
            }
        }

        // 保存笔记到本地存储
        function saveToLocal() {
            localStorage.setItem('myNotes', JSON.stringify(notes));
            renderNoteList();
            updateStatus('已保存');
        }

        // 渲染左侧列表
        function renderNoteList() {
            noteListEl.innerHTML = '';
            notes.forEach(note => {
                const li = document.createElement('li');
                li.className = `note-item ${note.id === activeNoteId ? 'active' : ''}`;
                li.onclick = () => loadNote(note.id);
                
                const date = new Date(note.updatedAt).toLocaleDateString();
                const title = note.title || '无标题笔记';
                
                li.innerHTML = `
                    <div class="note-title-preview">${title}</div>
                    <div class="note-date">${date}</div>
                `;
                noteListEl.appendChild(li);
            });
        }

        // 加载特定笔记
        function loadNote(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            if (note) {
                titleInput.value = note.title;
                contentInput.value = note.content;
                renderNoteList(); // 更新选中状态
            }
        }

        // 添加新笔记
        function addNewNote() {
            const newNote = {
                id: Date.now(),
                title: '',
                content: '',
                updatedAt: Date.now()
            };
            notes.unshift(newNote); // 添加到数组开头
            saveToLocal();
            loadNote(newNote.id);
            titleInput.focus();
        }

        // 删除笔记 (可选功能，这里使用简单的确认)
        function deleteCurrentNote() {
            if(confirm('确定要删除这篇笔记吗？')) {
                notes = notes.filter(n => n.id !== activeNoteId);
                saveToLocal();
                if(notes.length > 0) {
                    loadNote(notes[0].id);
                } else {
                    addNewNote();
                }
            }
        }

        // 监听输入变化，自动保存
        function handleInput() {
            const note = notes.find(n => n.id === activeNoteId);
            if (note) {
                note.title = titleInput.value;
                note.content = contentInput.value;
                note.updatedAt = Date.now();
                saveToLocal();
            }
        }

        // 更新状态栏
        function updateStatus(msg) {
            statusBar.innerText = msg + ' - ' + new Date().toLocaleTimeString();
        }

        // 绑定事件监听器
        titleInput.addEventListener('input', handleInput);
        contentInput.addEventListener('input', handleInput);
        
        // 增加一个删除快捷键 (Ctrl+D)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                e.preventDefault();
                deleteCurrentNote();
            }
        });

        // 启动
        init();

    </script>
</body>
</html>
